<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Помогатор</title>
  <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAA/4QAAADZ/wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAERERERERERESAAAAAAAAARIAAAAAAAABEgAAABEgAAESAAABESAAARIAABEREgABEgABESESAAESABESAREgARIBESAAESABEhESAAARIAESESAAABEQARIAAAAAARABEgAAAAABEAESAAAAAAAAARIiIiIiIiIhEREREREREREAAAAAP/4AAD/+AAA/HgAAPh4AADwOAAA4DgAAMIYAACHGAAADxgAAB8YAAD/mAAA/5gAAP/4AAAAAAAAAAAAA" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --bg:        #1a1a1a;
      --bg-card:   #232323;
      --bg-el:     #282828;
      --fg:        #f2f2f2;
      --fg-m:      #8888a0;
      --primary:   #4ade80;
      --primary-h: #22c55e;
      --border:    #2e2e2e;
      --radius:    0.5rem;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem 1rem 4rem;
    }
    .page { width: 100%; max-width: 640px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    h1 { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
    .back { color: var(--fg-m); text-decoration: none; font-size: 0.85rem; }
    .back:hover { color: var(--fg); }
    .task-cap {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.6rem 0.9rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.875rem;
      color: var(--fg); line-height: 1.5; margin-bottom: 1rem; word-break: break-word;
    }
    .mode-sel { display: flex; gap: 0.6rem; margin-bottom: 1.25rem; }
    .mode-btn {
      flex: 1; padding: 1rem 0.75rem; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--fg); font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; text-align: center; line-height: 1.4;
      transition: border-color 0.1s, background 0.1s;
    }
    .mode-btn:hover { border-color: var(--primary); background: var(--bg-el); }
    .mode-btn .sub { display: block; font-size: 0.72rem; font-weight: 400; color: var(--fg-m); margin-top: 0.2rem; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; margin-bottom: 0.75rem;
    }
    .badge { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--fg-m); margin-bottom: 0.5rem; }
    .step-q { font-size: 1.25rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.4rem; }
    .step-hint { font-size: 0.82rem; color: var(--fg-m); line-height: 1.6; margin-bottom: 1.1rem; white-space: pre-line; }
    .choices { display: flex; flex-direction: column; gap: 0.45rem; }
    .c-btn {
      display: block; width: 100%; padding: 0.8rem 1rem;
      border-radius: 7px; border: 1px solid var(--border); background: var(--bg-el);
      color: var(--fg); text-align: left; font-family: inherit; font-size: 0.95rem;
      font-weight: 500; cursor: pointer; line-height: 1.3;
      transition: background 0.08s, border-color 0.08s;
    }
    .c-btn:hover { background: var(--border); border-color: var(--primary); }
    .c-btn.yes    { border-color: #4ade80; color: #86efac; }
    .c-btn.yes:hover { background: #152b1a; }
    .c-btn.no     { color: var(--fg-m); }
    .c-btn.no:hover  { color: var(--fg); }
    .c-btn.warn   { border-color: #f59e0b; color: #fcd34d; }
    .c-btn.warn:hover { background: #271900; }
    .c-btn.danger { border-color: #f87171; color: #fca5a5; }
    .c-btn.danger:hover { background: #1f0808; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
    .chip {
      padding: 0.3rem 0.65rem; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--fg-m); cursor: pointer;
      font-family: inherit; font-size: 0.82rem; transition: all 0.08s;
    }
    .chip.sel { border-color: var(--primary); background: rgba(74,222,128,0.15); color: var(--fg); }
    .ctx-group-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--fg-m); margin: 0.8rem 0 0.3rem; }
    .ctx-group-label:first-child { margin-top: 0; }
    textarea, input[type=text], input[type=date] {
      width: 100%; background: var(--bg-el); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--fg); padding: 0.65rem 0.9rem;
      font-family: inherit; font-size: 0.95rem; line-height: 1.5; margin-bottom: 0.75rem;
    }
    textarea { min-height: 70px; resize: vertical; }
    textarea:focus, input:focus { outline: none; border-color: var(--primary); }
    .act-row { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-top: 0.75rem; }
    .btn {
      padding: 0.55rem 1rem; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg-el); color: var(--fg); font-family: inherit;
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      transition: background 0.08s, border-color 0.08s;
    }
    .btn:hover { background: var(--border); border-color: var(--primary); }
    .btn-p { background: var(--primary); border-color: transparent; color: #fff; }
    .btn-p:hover { background: var(--primary-h); border-color: transparent; }
    .btn-g { background: transparent; color: var(--fg-m); border-color: var(--border); font-size: 0.8rem; }
    .btn-g:hover { color: var(--fg); }
    .out-card {
      background: var(--bg-card); border: 1px solid var(--primary);
      border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 0.75rem;
    }
    .out-action {
      font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
      word-break: break-all; line-height: 1.6;
      border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 0.75rem;
      outline: none; border-radius: 4px; cursor: text;
      transition: background 0.1s;
    }
    .out-action:hover { background: rgba(255,255,255,0.04); }
    .out-action:focus { background: rgba(255,255,255,0.07); outline: 1px solid var(--primary); }
    .out-goal { font-size: 0.85rem; color: var(--fg-m); line-height: 1.6; }
    .out-goal strong { color: var(--fg); }
    .out-field { margin-top: 0.55rem; font-size: 0.85rem; color: var(--fg); line-height: 1.5; white-space: pre-wrap; }
    .out-field-lbl { display: block; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--fg-m); margin-bottom: 0.1rem; }
    .task-cap { transition: border-color 0.1s; }
    .task-cap:hover { border-color: var(--primary); }
    .task-cap::after { content: ' ✒'; font-size: 0.75rem; color: var(--fg-m); }
    .friend-quote {
      background: rgba(74,222,128,0.08); border-left: 3px solid var(--primary);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 0.75rem 1rem; margin-bottom: 1rem;
      font-size: 0.9rem; line-height: 1.6; color: var(--fg);
    }
    .friend-label { display: block; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-m); margin-bottom: 0.35rem; }
    .note { font-size: 0.8rem; color: var(--fg-m); margin-top: 0.5rem; }
    .note.ok { color: #86efac; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>&#x2699; Помогатор</h1>
    <a id="back-link" href="/" class="back">&#x2190; К списку</a>
    <script>(function(){
      var f = new URLSearchParams(window.location.search).get('from');
      if (f === 'tasks') document.getElementById('back-link').href = '/tasks';
    })();</script>
  </header>

  <div id="task-cap" class="task-cap hidden" onclick="returnToEdit()" title="Нажми, чтобы отредактировать задачу" style="cursor:pointer"></div>

  <div id="mode-sel" class="mode-sel">
    <button class="mode-btn" onclick="startFlow('korz')">
      &#x1F4E5; Разбор корзины
      <span class="sub">С этим надо что-то делать?</span>
    </button>
    <button class="mode-btn" onclick="startFlow('mutny')">
      &#x1F52E; Мутная задача
      <span class="sub">Непонятно следующее действие</span>
    </button>
  </div>

  <div id="edit-area" class="card hidden">
    <div class="badge" id="edit-badge"></div>
    <div class="step-q">Что нужно обработать?</div>
    <div class="step-hint">Отредактируй текст задачи если нужно</div>
    <textarea id="task-input" rows="3" placeholder="Задача или идея..."></textarea>
    <div class="act-row">
      <button class="btn btn-p" onclick="afterEdit()">Дальше &#x2192;</button>
    </div>
  </div>

  <div id="step-area" class="hidden"></div>

  <div id="out-area" class="hidden">
    <div class="card">
      <div class="badge">Готово</div>
      <div class="step-q" id="out-title" style="margin-bottom:0.75rem"></div>
      <div class="out-card">
        <div class="out-action" id="out-line" contenteditable="true" spellcheck="false" title="Нажми, чтобы отредактировать"></div>
        <div class="out-goal" id="out-goal"></div>
      </div>
      <div class="act-row">
        <button class="btn btn-p" onclick="copyOut()">&#x1F4CB; Копировать</button>
        <button class="btn" onclick="addToList()">&#x2795; В список</button>
        <button id="next-task-btn" class="btn btn-p hidden" onclick="nextTask()">&#x27A1; Следующая задача</button>
        <button class="btn btn-g" onclick="resetAll()">&#x21BA; Ещё одну</button>
      </div>
      <div class="note" id="out-note"></div>
    </div>
    <div id="offer-mutny" class="card hidden">
      <div class="step-q" style="font-size:1rem;margin-bottom:0.5rem">Задача мутная? Запустить разбор?</div>
      <div class="act-row">
        <button class="btn btn-p" onclick="continueWithMutny()">&#x1F52E; Разобрать мутную задачу</button>
        <button class="btn btn-g" onclick="el('offer-mutny').classList.add('hidden')">Нет, и так всё ясно</button>
      </div>
    </div>
  </div>
</div>

<script src="flows.js"></script>
<script>
// ==========================================================================
//  ДВИЖОК (алгоритм — в flows.js)
// ==========================================================================

const S = {
  task:'', originalTask:'', mode:null, flow:null, stepIdx:0, history:[],
  outcome:'', action:'', delegate:'', dueDate:'',
  priority:null, contexts:[], feelings:'', advice:'',
};

function el(id)       { return document.getElementById(id); }
function hide(...ids) { ids.forEach(i => el(i)?.classList.add('hidden')); }
function show(...ids) { ids.forEach(i => el(i)?.classList.remove('hidden')); }

function startFlow(mode) {
  S.mode = mode; S.flow = FLOWS[mode]; S.history = [];
  hide('mode-sel');
  el('edit-badge').textContent = mode === 'korz' ? 'РАЗБОР КОРЗИНЫ' : 'МУТНАЯ ЗАДАЧА';
  el('task-input').value = S.task;
  show('edit-area');
  el('task-input').focus();
}

function afterEdit() {
  const v = el('task-input').value.trim();
  if (!v) { el('task-input').focus(); return; }
  S.task = v;
  el('task-cap').textContent = v;
  show('task-cap');
  hide('edit-area');
  // If we're mid-flow (returned to edit from a step), go back to that step.
  // If starting fresh, start from step 0.
  const resumeIdx = S.flow && S.stepIdx > 0 ? S.stepIdx : 0;
  if (resumeIdx === 0) S.history = [];
  renderStep(resumeIdx);
}

function renderStep(idx) {
  const step = S.flow[idx];
  if (!step) { finalize(); return; }

  // Auto-skip: check skipIf condition before rendering
  if (step.skipIf && step.skipIf()) {
    renderStep(findIdx(step.skipTo));
    return;
  }

  S.stepIdx = idx;
  hide('out-area');
  const area = el('step-area');
  show('step-area');

  const mlabel = S.mode === 'korz' ? 'РАЗБОР КОРЗИНЫ' : 'МУТНАЯ ЗАДАЧА';
  const total  = S.flow.length;
  // Support both static hint string and dynamic hintFn
  const hint = step.hintFn ? step.hintFn() : (step.hint || '');
  const hintHtml = step.hintHtmlFn ? step.hintHtmlFn() : (step.hintHtml || '');

  let h = '<div class="card">';
  h += '<div class="badge">' + mlabel + ' &mdash; шаг ' + (idx+1) + ' / ' + total + '</div>';
  h += '<div class="step-q">' + esc(step.q) + '</div>';
  if (hint) h += '<div class="step-hint">' + esc(hint) + '</div>';
  if (hintHtml) h += hintHtml;

  if (step.type === 'choice') {
    h += '<div class="choices">';
    step.choices.forEach((c, ci) => {
      const cls = c.style ? ' ' + c.style : '';
      let fn;
      if      (c.back)   fn = 'goTo(' + findIdx(c.back) + ')';
      else if (c.switch) fn = "switchFlow('" + c.switch + "'," + ci + ')';
      else if (c.action) fn = "doAction('"  + c.action + "'," + ci + ')';
      else               fn = 'goNext(' + findIdx(c.next) + ',' + ci + ')';
      h += '<button class="c-btn' + cls + '" onclick="' + fn + '">' + esc(c.label) + '</button>';
    });
    h += '</div>';

  } else if (step.type === 'text') {
    const val = esc(S[step.field] || '');
    if (step.multiline) {
      h += '<textarea id="sf" placeholder="' + esc(step.placeholder||'') + '">' + val + '</textarea>';
    } else {
      h += '<input type="text" id="sf" placeholder="' + esc(step.placeholder||'') + '" value="' + val + '" />';
    }
    h += '<div class="act-row">';
    if (step.action)
      h += '<button class="btn btn-p" onclick="textAction(\'' + step.field + '\',\'' + step.action + '\')">Дальше &rarr;</button>';
    else
      h += '<button class="btn btn-p" onclick="textNext(\'' + step.field + '\',' + findIdx(step.next) + ')">Дальше &rarr;</button>';
    h += '</div>';

  } else if (step.type === 'date') {
    h += '<input type="date" id="sf" value="' + (S.dueDate || todayStr()) + '" />';
    h += '<div class="act-row">';
    if (step.action)
      h += '<button class="btn btn-p" onclick="dateAction(\'' + step.field + '\',\'' + step.action + '\')">Дальше &rarr;</button>';
    else
      h += '<button class="btn btn-p" onclick="dateNext(\'' + step.field + '\',' + findIdx(step.next) + ')">Дальше &rarr;</button>';
    h += '</div>';

  } else if (step.type === 'contexts') {
    if (step.groups) {
      step.groups.forEach(g => {
        h += '<div class="ctx-group-label">' + esc(g.label) + '</div>';
        h += '<div class="chips">';
        g.chips.forEach(tag => {
          const sel = S.contexts.includes(tag) ? ' sel' : '';
          h += '<button class="chip' + sel + '" onclick="toggleCtx(this,\'' + esc(tag) + '\')">' + esc(tag) + '</button>';
        });
        h += '</div>';
      });
    } else {
      h += '<div class="chips">';
      (step.chips || []).forEach(tag => {
        const sel = S.contexts.includes(tag) ? ' sel' : '';
        h += '<button class="chip' + sel + '" onclick="toggleCtx(this,\'' + esc(tag) + '\')">' + esc(tag) + '</button>';
      });
      h += '</div>';
    }
    const ni = findIdx(step.next);
    h += '<div class="act-row">';
    h += '<button class="btn btn-p" onclick="goNext(' + ni + ',-1)">Дальше &rarr;</button>';
    h += '<button class="btn btn-g" onclick="goNext(' + ni + ',-1)">Пропустить</button>';
    h += '</div>';

  } else if (step.type === 'coinflip') {
    const heads = Math.random() < 0.5;
    const noIdx = findIdx(step.noactionId || 'noaction');
    const yesIdx = findIdx(step.yesId || 'mine');
    if (heads) {
      h += '<div style="font-size:2.5rem;line-height:1;margin:0.25rem 0">🪙</div>';
      h += '<div class="step-q" style="margin-top:0.3rem">Выпал орёл. Не надо делать.</div>';
      h += '<div class="step-hint">Монетка решила: задача не требует действий.\n\nВот что с ней можно сделать:\n\u2022 Отложить в «Когда-нибудь / Может быть» и рассмотреть позже\n\u2022 Добавить в справочные материалы\n\u2022 Удалить в корзину</div>';
      h += '<div class="choices">';
      h += '<button class="c-btn warn" onclick="goNext(' + noIdx + ',-1)">Принять решение монетки &rarr;</button>';
      h += '<button class="c-btn no" onclick="renderStep(' + idx + ')">\uD83D\uDD04 Перебросить монетку</button>';
      h += '<button class="c-btn yes" onclick="goNext(' + yesIdx + ',-1)">Всё равно буду делать</button>';
      h += '</div>';
    } else {
      h += '<div style="font-size:2.5rem;line-height:1;margin:0.25rem 0">🪙</div>';
      h += '<div class="step-q" style="margin-top:0.3rem">Выпала решка. Делаем!</div>';
      h += '<div class="step-hint">Монетка решила: задача требует действий.</div>';
      h += '<div class="choices">';
      h += '<button class="c-btn yes" onclick="goNext(' + yesIdx + ',-1)">Делаем &rarr;</button>';
      h += '<button class="c-btn no" onclick="renderStep(' + idx + ')">\uD83D\uDD04 Перебросить монетку</button>';
      h += '<button class="c-btn warn" onclick="goNext(' + noIdx + ',-1)">Всё равно не буду делать</button>';
      h += '</div>';
    }
  }

  h += '<div style="margin-top:0.75rem;display:flex;gap:0.5rem;flex-wrap:wrap">';
  if (S.history.length > 0)
    h += '<button class="btn btn-g" onclick="goBack()">&larr; Назад</button>';
  h += '<button class="btn btn-g" onclick="returnToEdit()" title="Изменить исходный текст задачи"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="13" height="13" style="vertical-align:-1px;margin-right:4px"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Задача</button>';
  h += '</div>';

  h += '</div>';
  area.innerHTML = h;

  const sf = el('sf');
  if (sf) {
    sf.focus();
    if (!step.multiline && step.type === 'text') {
      sf.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); sf.closest('.card').querySelector('.btn-p')?.click(); }
      });
    }
  }
  window.scrollTo(0,0);
}

function findIdx(id) { return S.flow.findIndex(s => s.id === id); }

function goNext(idx, ci) {
  const step = S.flow[S.stepIdx];
  if (ci >= 0 && step.choices?.[ci]?.pri) S.priority = step.choices[ci].pri;
  S.history.push(S.stepIdx);
  renderStep(idx);
}
function goTo(idx) { renderStep(idx); }
function goBack() {
  if (!S.history.length) return;
  // Save any text/date currently in the input before going back
  const sf = el('sf');
  if (sf) {
    const step = S.flow[S.stepIdx];
    if (step && step.field) S[step.field] = sf.value;
  }
  renderStep(S.history.pop());
}
function returnToEdit() {
  // Save current field value if applicable
  const sf = el('sf');
  if (sf) {
    const step = S.flow[S.stepIdx];
    if (step && step.field) S[step.field] = sf.value;
  }
  hide('step-area', 'out-area');
  el('task-input').value = S.task;
  show('edit-area');
  el('task-input').focus();
  window.scrollTo(0, 0);
}
function switchFlow(mode, ci) {
  S.mode = mode; S.flow = FLOWS[mode]; S.history = []; S.stepIdx = 0;
  renderStep(0);
}
function doAction(action, ci) {
  const step = S.flow[S.stepIdx];
  if (ci >= 0 && step.choices?.[ci]?.pri) S.priority = step.choices[ci].pri;
  showOutput(action);
}
function textNext(field, nextIdx) {
  const sf = el('sf'); if (!sf) return;
  S[field] = sf.value.trim(); S.history.push(S.stepIdx); renderStep(nextIdx);
}
function textAction(field, action) {
  const sf = el('sf'); if (!sf) return;
  S[field] = sf.value.trim(); showOutput(action);
}
function dateAction(field, action) {
  const sf = el('sf'); if (sf) S[field] = sf.value; showOutput(action);
}
function dateNext(field, nextIdx) {
  const sf = el('sf'); if (sf) S[field] = sf.value;
  S.history.push(S.stepIdx); renderStep(nextIdx);
}
function toggleCtx(btn, tag) {
  btn.classList.toggle('sel');
  if (S.contexts.includes(tag)) S.contexts = S.contexts.filter(t => t !== tag);
  else S.contexts.push(tag);
}
function finalize() { showOutput(S.mode === 'korz' ? 'next_action' : 'output'); }

// --- Output ---

function showOutput(action) {
  hide('step-area'); show('out-area'); hide('offer-mutny');
  const t = todayStr();
  let line='', title='Готово', goalHtml='';

  if (action === 'trash') {
    title='🗑 Удалить'; line='# УДАЛЕНО: ' + S.task;
  } else if (action === 'someday') {
    title='💡 Когда-нибудь'; line=S.task + ' +someday-maybe';
  } else if (action === 'ref') {
    title='📂 Справочная информация'; line=S.task + ' +information';
  } else if (action === 'delegate') {
    title='👆 Делегировано';
    const who = S.delegate ? ' @' + S.delegate.replace(/\s+/g,'_') : '';
    line=S.task + ' @ожидание' + who + ' due:' + t;
  } else if (action === 'calendar') {
    title='📅 В календарь'; line=S.task + ' due:' + (S.dueDate || t);
  } else if (action === 'now') {
    title='⚡ Сделать прямо сейчас'; line='x ' + t + ' ' + S.task;
  } else if (action === 'next_action') {
    title='📋 Следующее действие'; line=buildNextLine(t);
    if (S.mode==='korz') show('offer-mutny');
  } else if (action === 'output') {
    title='✅ Разобрано'; line=buildMutnyLine(t);
    // Show goal, difficulty and advice separately in the UI (they're also embedded in the line)
    if (S.outcome)  goalHtml += '<div class="out-field"><span class="out-field-lbl">🎯 Цель</span>' + esc(S.outcome)  + '</div>';
    if (S.feelings) goalHtml += '<div class="out-field"><span class="out-field-lbl">😰 Сложность</span>' + esc(S.feelings) + '</div>';
    if (S.advice)   goalHtml += '<div class="out-field"><span class="out-field-lbl">💜 Совет</span>' + esc(S.advice)   + '</div>';
  }

  el('out-title').textContent = title;
  el('out-line').textContent  = line;
  el('out-goal').innerHTML    = goalHtml;
  el('out-note').textContent  = '';
  el('out-note').className    = 'note';
  // Show "next task" button only when we came from a task list
  if (S.originalTask) show('next-task-btn'); else hide('next-task-btn');
}

function buildNextLine(t) {
  const parts = [];
  const pri = S.priority==='red' ? '(A)' : S.priority==='green' ? '(B)' : null;
  if (pri) parts.push(pri);
  parts.push(t);
  parts.push(S.action || S.task);
  S.contexts.forEach(c => parts.push(c));
  if (S.dueDate) parts.push('due:' + S.dueDate);
  return parts.join(' ');
}

function buildMutnyLine(t) {
  const pri = S.priority==='red' ? '(A)' : S.priority==='green' ? '(B)' : null;
  const parts = [];
  if (pri) parts.push(pri);
  parts.push(t);
  parts.push((S.action || S.task).trim());
  S.contexts.forEach(c => parts.push(c));
  let line = parts.join(' ');
  // Embed goal inline — renderers split on ➤цель: for visual display
  if (S.outcome)   line += ' \u27A4\u0446\u0435\u043B\u044C:' + S.outcome.trim().replace(/\n/g,' ');
  if (S.feelings)  line += ' \u27A4\u0441\u043B\u043E\u0436\u043D\u043E\u0441\u0442\u044C:' + S.feelings.trim().replace(/\n/g,' ');
  if (S.advice)    line += ' \u27A4\u0441\u043E\u0432\u0435\u0442:' + S.advice.trim().replace(/\n/g,' ');
  return line;
}

function continueWithMutny() {
  el('offer-mutny').classList.add('hidden');
  if (!S.action) S.action = S.task;
  S.mode='mutny'; S.flow=FLOWS.mutny; S.history=[]; S.stepIdx=0;
  hide('out-area'); show('step-area'); renderStep(0);
}

function copyOut() {
  navigator.clipboard.writeText(el('out-line').textContent.trim()).then(() => {
    el('out-note').textContent='Скопировано!'; el('out-note').className='note ok';
  });
}

function addToList() {
  const line = el('out-line').textContent.trim();
  if (!line || line.startsWith('# УДАЛЕНО')) {
    el('out-note').textContent='Помечено как удалённое \u2014 в список не добавляется.'; return;
  }
  const existing = localStorage.getItem('tasks') || '';
  const lines = existing ? existing.split('\n') : [];
  // If came from a specific task, replace it instead of prepending
  if (S.originalTask) {
    const idx = lines.findIndex(l => l.trim() === S.originalTask.trim());
    let finalLine = line;
    // Carry URLs from original task to new line
    const origUrls = (S.originalTask.match(/https?:\/\/\S+/g) || []);
    origUrls.forEach(url => {
      if (!finalLine.includes(url)) {
        // Insert before hidden note ⟦...⟧ if present, otherwise append
        if (/\u27e6/.test(finalLine)) {
          finalLine = finalLine.replace(/(\s*\u27e6)/, ' ' + url + '$1');
        } else {
          finalLine += ' ' + url;
        }
      }
    });
    // If task text changed, preserve original in hidden note \u27e6...\u27e7
    const origCore = S.originalTask.replace(/\s*\u27e6[\s\S]*\u27e7/, '').trim();
    const newCore  = line.replace(/\s*\u27e6[\s\S]*\u27e7/, '').trim();
    if (origCore !== newCore) {
      // Extract existing note from new line (if any), prepend original text
      const existingNoteMatch = line.match(/\s*\u27e6([\s\S]*)\u27e7/);
      const existingNote = existingNoteMatch ? existingNoteMatch[1] : '';
      const origNote = '\u0438\u0441\u0445.: ' + origCore;
      const combined = existingNote ? origNote + ' | ' + existingNote : origNote;
      finalLine = line.replace(/\s*\u27e6[\s\S]*\u27e7/, '').trim() + ' \u27e6' + combined + '\u27e7';
    }
    if (idx !== -1) {
      lines[idx] = finalLine;
      localStorage.setItem('tasks', lines.join('\n'));
      el('out-note').textContent = 'Задача обновлена!';
      el('out-note').className = 'note ok';
      return;
    }
    // Original not found — prepend
    localStorage.setItem('tasks', finalLine + (existing ? '\n' + existing : ''));
    el('out-note').textContent='Добавлено в список!'; el('out-note').className='note ok';
    return;
  }
  // Otherwise prepend
  localStorage.setItem('tasks', line + (existing ? '\n' + existing : ''));
  el('out-note').textContent='Добавлено в список!'; el('out-note').className='note ok';
}

function resetAll() {
  Object.assign(S, { task:'', originalTask:'', mode:null, flow:null, stepIdx:0, history:[],
    outcome:'',action:'',delegate:'',dueDate:'',priority:null,contexts:[],feelings:'',advice:'' });
  hide('step-area','out-area','task-cap','edit-area'); show('mode-sel'); window.scrollTo(0,0);
}

function nextTask() {
  const lines = (localStorage.getItem('tasks') || '').split('\n');
  const curIdx = lines.findIndex(l => l.trim() === (S.originalTask || '').trim());
  const start = curIdx !== -1 ? curIdx + 1 : 0;
  let inIgnored = false;
  for (let i = start; i < lines.length; i++) {
    const l = lines[i].trim();
    if (!l) continue;
    if (/^ИГНОРИРУЕМЫЕ\s+ЗАДАЧИ/i.test(l)) { inIgnored = true; continue; }
    if (inIgnored) continue;
    if (/^(SORTED\s*\(|PARTIALLY SORTED|NEW ARRAY|НЕУПОРЯДОЧЕННЫЕ ЗАДАЧИ)/i.test(l)) continue;
    if (/^x\s/.test(l)) continue;
    if (/\+someday-maybe/.test(l)) continue;
    window.location.href = '/process?task=' + encodeURIComponent(lines[i]) + '&from=tasks';
    return;
  }
  el('out-note').textContent = 'Больше задач для обработки нет!';
  el('out-note').className = 'note ok';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function todayStr() { return new Date().toISOString().slice(0,10); }

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const tp   = params.get('task');
  const flow = params.get('flow') || 'korz';
  if (tp) {
    const fullTask = decodeURIComponent(tp);
    // Strip hidden note ⟦...⟧ from displayed task; keep full as originalTask for lookup
    S.task = fullTask.replace(/\s*\u27e6[\s\S]*\u27e7/, '').trim();
    S.originalTask = fullTask;
    el('task-cap').textContent = S.task;
    show('task-cap');
    startFlow(FLOWS[flow] ? flow : 'korz');
  }
});
</script>
