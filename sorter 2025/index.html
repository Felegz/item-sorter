
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Sorter</title>
  <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAA/4QAAADZ/wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAERERERERERESAAAAAAAAARIAAAAAAAABEgAAABEgAAESAAABESAAARIAABEREgABEgABESESAAESABESAREgARIBESAAESABEhESAAARIAESESAAABEQARIAAAAAARABEgAAAAABEAESAAAAAAAAARIiIiIiIiIhEREREREREREAAAAAP/4AAD/+AAA/HgAAPh4AADwOAAA4DgAAMIYAACHGAAADxgAAB8YAAD/mAAA/5gAAP/4AAAAAAAAAAAAA" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <div id="filter-bar"></div>

    <textarea
      class="text-field"
      id="task-list"
      placeholder="Enter your list of tasks here.
Write one task per line.
Duplicate and empty lines will be ignored automatically.
Hit Sort button.
Output will appear in the same area as input.
Your text will be stored in browser memory even after page reload, but it's not reliable! Better save it somewhere else too!"
    ></textarea>

    <textarea
      id="user-question"
      rows="2"
      placeholder="Which task would bring more value or impact if completed first? (Enter your custom question here)"
      class="text-field"
    ></textarea>

    <div class="toolbar">

      <!-- Задача -->
      <div class="btn-group">
        <span class="btn-group-label">Задача</span>
        <div class="btn-row">
          <button id="done-button" class="btn--accent">&#x2705; Отметить выполненной</button>
          <button id="assign-priorities-btn" class="btn--accent">&#x1F3C6; Присвоить приоритеты</button>
          <button id="process-btn" class="btn--accent">&#x2699; Обработать (GTD)</button>
        </div>
      </div>

      <!-- Сортировка -->
      <div class="btn-group">
        <span class="btn-group-label">Сортировка</span>
        <div class="btn-row">
          <button id="filter-button">Filter Tasks</button>
          <button id="sort-button">Sort Tasks</button>
          <button id="insert-button">Insert Unsorted Tasks</button>
          <button id="merge-button">Merge Arrays</button>
        </div>
      </div>

      <!-- Данные -->
      <div class="btn-group">
        <span class="btn-group-label">Данные</span>
        <div class="btn-row">
          <button id="copy-button" class="btn--ghost">&#x1F4CB; Copy</button>
          <button id="save-button" class="btn--ghost" onclick="saveAsTxt()">Save .txt</button>
          <button id="dbx-login-btn" class="btn--dbx-login">&#x1F4E6; Войти в Dropbox</button>
          <button id="dbx-save-btn" class="btn--dbx-save" hidden>&#x2601; В Dropbox</button>
          <button id="dbx-load-btn" class="btn--dbx-load" hidden>&#x1F4E5; Из Dropbox</button>
          <button id="dbx-logout-btn" class="btn--ghost btn--sm" hidden>Выйти из Dropbox</button>
        </div>
        <div id="dbx-status"></div>
      </div>

    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>
    <script src="dropbox.js"></script>
    <script src="todotxt.js"></script>

    <footer>
      <p>
        Created by
        <a href="https://linktr.ee/kostya.kushko">Kostya Kushko</a>
        with &#x1F5A4;
      </p>
    </footer>

  </div>
</body>
</html>
