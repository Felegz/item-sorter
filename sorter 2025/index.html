
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Sorter</title>
  <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAA/4QAAADZ/wAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAERERERERERESAAAAAAAAARIAAAAAAAABEgAAABEgAAESAAABESAAARIAABEREgABEgABESESAAESABESAREgARIBESAAESABEhESAAARIAESESAAABEQARIAAAAAARABEgAAAAABEAESAAAAAAAAARIiIiIiIiIhEREREREREREAAAAAP/4AAD/+AAA/HgAAPh4AADwOAAA4DgAAMIYAACHGAAADxgAAB8YAAD/mAAA/5gAAP/4AAAAAAAAAAAAA" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div id="filter-bar"></div>

    <br />
    <textarea
      class="text-field"
      id="task-list"
      placeholder="Enter your list of tasks here.
Write one task per line.
Duplicate and empty lines will be ignored automatically.
Hit Sort button.
Output will appear in the same area as input.
Your text will be stored in browser memory even after page reload, but it's not reliable! Better save it somewhere else too!"
    ></textarea>

    <br />

    <!-- Add this input field for the user's question -->
    <!-- <label for="user-question">Enter your question:</label> -->
    <textarea
      id="user-question"
      rows="1"
      cols="50"
      placeholder="Which task would bring more value or impact if completed first? (Enter your сustom question here)"
      class="text-field"
    ></textarea>

    <button id="done-button">&#x2705; Отметить выполненной</button>
    <button id="assign-priorities-btn">&#x1F3C6; Присвоить приоритеты (A)(B)(C)</button>
    <button id="process-btn">&#x2699; Обработать задачу (GTD)</button>

    <!-- Фильтрация (редактирование + разделение) -->
    <button id="filter-button">Filter Tasks</button>

    <!-- Чистая сортировка уже отфильтрованных -->
    <button id="sort-button">Sort Tasks</button>
    <button id="insert-button">Insert Unsorted Tasks</button>

    <button id="merge-button">Merge Arrays</button>
    
   <button id="copy-button">&#x1F4CB; Copy to clipboard</button>



    <button id="save-button" onclick="saveAsTxt()">Save as .txt file</button>

    <div id="dropbox-section">
      <button id="dbx-login-btn" class="dbx-btn dbx-btn--login">&#x1F4E6; Войти в Dropbox</button>
      <button id="dbx-save-btn" class="dbx-btn dbx-btn--save" hidden>&#x2601; Сохранить в Dropbox</button>
      <button id="dbx-load-btn" class="dbx-btn dbx-btn--load" hidden>&#x1F4E5; Загрузить из Dropbox</button>
      <button id="dbx-logout-btn" class="dbx-btn dbx-btn--logout" hidden>Выйти из Dropbox</button>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="app.js"></script>
    <script src="dropbox.js"></script>
    <script src="todotxt.js"></script>

    <footer style="text-align: center; margin-top: 20px">
      <p style="font-size: 14px; color: #888">
        Created by
        <a href="https://linktr.ee/kostya.kushko" style="color: #888"
          >Kostya Kushko</a
        >
        with &#x1F5A4;
      </p>
    </footer>
</body>
</html>
