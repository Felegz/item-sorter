    <br />
    <textarea
      class="text-field"
      id="task-list"
      placeholder="Enter your list of tasks here.
Write one task per line.
Duplicate and empty lines will be ignored automatically.
Hit Sort button.
Output will appear in the same area as input.
Your text will be stored in browser memory even after page reload, but it's not reliable! Better save it somewhere else too!"
    ></textarea>

    <br />

    <!-- Add this input field for the user's question -->
    <!-- <label for="user-question">Enter your question:</label> -->
    <textarea
      id="user-question"
      rows="1"
      cols="50"
      placeholder="Which task would bring more value or impact if completed first? (Enter your сustom question here)"
      class="text-field"
    ></textarea>

    <!-- Фильтрация (редактирование + разделение) -->
    <button id="filter-button">Filter Tasks</button>

    <!-- Чистая сортировка уже отфильтрованных -->
    <button id="sort-button">Sort Tasks</button>
    <button id="insert-button">Insert Unsorted Tasks</button>

    <button id="merge-button">Merge Arrays</button>
    
   <button id="copy-button">📋 Copy to clipboard</button>



    <button id="save-button" onclick="saveAsTxt()">Save as .txt file</button>
