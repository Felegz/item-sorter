<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи — Помогатор</title>
  <!-- jsTodoTxt 0.10.0 — MIT license, github.com/jmhobbs/jsTodoTxt -->
  <script src="https://cdn.jsdelivr.net/npm/jstodotxt@0.10.0/jsTodoTxt.min.js"></script>
  <!-- vanilla-context-menu 1.6.0 — MIT license, github.com/GeorgianStan/vanilla-context-menu -->
  <script src="https://unpkg.com/vanilla-context-menu@1.6.0/dist/vanilla-context-menu.js"></script>
  <style>
    :root {
      --bg: #1c1c2e;
      --bg-card: #252539;
      --bg-el: #27273e;
      --fg: #f2f2f2;
      --fg-m: #8888ab;
      --primary: #7c6fcd;
      --primary-h: #6a5fc0;
      --border: #2e2e4a;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
    }
    a { color: var(--primary); text-decoration: none; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }
    h1 { flex: 1; font-size: 1.25rem; font-weight: 600; }
    .badge {
      font-size: 0.72rem;
      background: var(--bg-el);
      color: var(--fg-m);
      padding: 2px 9px;
      border-radius: 12px;
    }

    /* Quick-add */
    .add-bar {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.65rem;
    }
    .add-bar input {
      flex: 1;
      background: var(--bg-card);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.8rem;
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-bar input:focus { border-color: var(--primary); }
    .add-bar input::placeholder { color: var(--fg-m); }
    .add-bar button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 1rem;
      font-size: 1.1rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .add-bar button:hover { background: var(--primary-h); }

    /* Search */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.3rem 0.7rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }
    .search-bar:focus-within { border-color: var(--primary); }
    .search-icon { color: var(--fg-m); font-size: 0.85rem; flex-shrink: 0; }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-size: 0.88rem;
      font-family: inherit;
    }
    .search-bar input::placeholder { color: var(--fg-m); }
    .search-clear {
      background: transparent;
      border: none;
      color: var(--fg-m);
      cursor: pointer;
      padding: 0 2px;
      font-size: 0.8rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .search-clear:hover { color: var(--fg); }

    /* Tabs */
    .tabs { display: flex; gap: 0.35rem; margin-bottom: 0.75rem; }
    .tab {
      padding: 4px 15px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-el);
      color: var(--fg-m);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .tab.on { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Chips */
    .chip-section { margin-bottom: 0.55rem; }
    .chip-label {
      font-size: 0.61rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--fg-m);
      margin-bottom: 0.26rem;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .chip {
      padding: 2px 10px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-el);
      color: var(--fg-m);
      font-size: 0.76rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s;
    }
    .chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Priority chip colours */
    .chip.pri-a { border-color: #c05050; color: #f08080; }
    .chip.pri-a.on { background: #f08080; color: #1c1c2e; border-color: #f08080; }
    .chip.pri-b { border-color: #b08030; color: #f0c070; }
    .chip.pri-b.on { background: #f0c070; color: #1c1c2e; border-color: #f0c070; }
    .chip.pri-c { border-color: #3070a0; color: #7cb8f0; }
    .chip.pri-c.on { background: #7cb8f0; color: #1c1c2e; border-color: #7cb8f0; }
    .chip.pri-d { border-color: #6040a0; color: #bd93f9; }
    .chip.pri-d.on { background: #bd93f9; color: #1c1c2e; border-color: #bd93f9; }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
      font-size: 0.78rem;
      color: var(--fg-m);
    }
    .controls select {
      background: var(--bg-el);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
    }
    #clear-filters {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg-m);
      border-radius: 14px;
      padding: 2px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: inherit;
    }
    #clear-filters:hover { color: var(--fg); border-color: var(--fg-m); }

    /* Task list */
    .tasklist { display: flex; flex-direction: column; gap: 0.35rem; }
    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.55rem 0.75rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .task-row.done { opacity: 0.45; }
    .task-row input[type="checkbox"] {
      flex-shrink: 0;
      margin-top: 3px;
      width: 15px;
      height: 15px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 0.88rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .task-row.done .task-text { text-decoration: line-through; color: var(--fg-m); }
    .task-goal {
      display: block;
      font-size: 0.74rem;
      color: var(--fg-m);
      margin-top: 0.1rem;
      font-style: italic;
    }
    .task-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-top: 0.3rem;
    }
    .t { font-size: 0.68rem; padding: 1px 6px; border-radius: 10px; }
    .t-ctx  { background: #1b2a3a; color: #7cb8f0; }
    .t-proj { background: #1a2b1a; color: #7fc97f; }
    .t-pri  { font-weight: 700; border-radius: 4px; padding: 1px 6px; }
    .t-pri-A { background: #3a1e1e; color: #f08080; }
    .t-pri-B { background: #3a2b1a; color: #f0c070; }
    .t-pri-C { background: #1a2a3a; color: #7cb8f0; }
    .t-pri-D { background: var(--bg-el); color: var(--fg-m); }
    .t-date  { font-size: 0.66rem; color: #55556a; }

    /* Due date badges */
    .t-due { font-weight: 500; }
    .due-overdue { background: #3a1e1e; color: #f08080; }
    .due-today   { background: #3a2b1a; color: #f0c070; }
    .due-soon    { background: #1a2b1a; color: #7fc97f; }
    .due-ok      { background: var(--bg-el); color: var(--fg-m); }

    /* Links inside task text */
    .task-link { color: #7cb8f0; text-decoration: underline; word-break: break-all; }
    .task-link:hover { color: #a8d0ff; }

    /* Search highlight */
    mark {
      background: rgba(124, 111, 205, 0.4);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* Process button */
    .proc-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      color: var(--fg-m);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      opacity: 0.35;
      margin-top: 1px;
    }
    .proc-btn:hover { opacity: 1; color: var(--primary); }

    .empty { text-align: center; color: var(--fg-m); padding: 2.5rem; font-style: italic; }
    .kbd { font-size: 0.68rem; color: var(--fg-m); background: var(--bg-el); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; line-height: 1.6; }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--fg-m);
      padding: 0.6rem 0.2rem 0.2rem;
      border-bottom: 1px solid var(--border);
      margin-top: 0.4rem;
      margin-bottom: 0.1rem;
      cursor: pointer;
      user-select: none;
    }
    .section-header:hover { color: var(--fg); }
    .section-toggle {
      font-size: 0.62rem;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .section-toggle.collapsed { transform: rotate(-90deg); }
    .section-count {
      margin-left: auto;
      font-size: 0.64rem;
      color: var(--fg-m);
      opacity: 0.6;
    }

    /* Ignored tasks */
    .ignored-row { opacity: 0.38; border-style: dashed; }
    .ignored-row .task-text { font-style: italic; }
    #ignored-toggle {
      display: none;
      width: 100%;
      text-align: center;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--fg-m);
      border-radius: 8px;
      padding: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      margin-top: 0.35rem;
    }
    #ignored-toggle:hover { color: var(--fg); border-color: var(--fg-m); }

    /* Search hint */
    .search-hint { font-size: 0.68rem; color: var(--fg-m); margin-bottom: 0.4rem; }
    .search-hint code { background: var(--bg-el); border-radius: 3px; padding: 0 4px; font-size: 0.66rem; }

    /* vanilla-context-menu dark theme override */
    .vanilla-context-menu {
      --menu-bg: #252539 !important;
      --menu-border: #2e2e4a !important;
      background: #252539 !important;
      border: 1px solid #2e2e4a !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      font-size: 0.85rem !important;
      padding: 4px !important;
    }
    .vanilla-context-menu > li {
      color: #f2f2f2 !important;
      border-radius: 5px !important;
      padding: 6px 14px !important;
    }
    .vanilla-context-menu > li:hover { background: #2e2e4a !important; }
    .vanilla-context-menu > li.separator {
      background: #2e2e4a !important;
      height: 1px !important;
      margin: 3px 6px !important;
      padding: 0 !important;
    }
  </style>
</head>
<body>
  <header>
    <a href="/">← Назад</a>
    <h1>Задачи</h1>
    <span class="badge" id="count">0</span>
  </header>

  <!-- Quick add -->
  <div class="add-bar">
    <input id="add-input" type="text" placeholder="Новая задача… (A) +проект @контекст due:2026-04-10">
    <button id="add-btn" title="Добавить (Enter)">+</button>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input id="search" type="search" placeholder="Поиск… word -исключить &quot;точная фраза&quot; A OR B">
    <button class="search-clear" id="search-clear" style="display:none" title="Очистить">✕</button>
    <span class="kbd" title="Нажми / чтобы сфокусироваться">/</span>
  </div>
  <div class="search-hint">Операторы: <code>-слово</code> исключить &nbsp; <code>OR</code> или <code>||</code> &nbsp; <code>AND</code> или <code>&&</code> &nbsp; <code>"точная фраза"</code></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" data-t="active">Активные</button>
    <button class="tab" data-t="all">Все</button>
    <button class="tab" data-t="done">Выполненные</button>
  </div>

  <!-- Priority filter -->
  <div id="pri-sec" class="chip-section" style="display:none">
    <div class="chip-label">Приоритет</div>
    <div class="chip-row" id="pri-row"></div>
  </div>

  <!-- Context filter -->
  <div id="ctx-sec" class="chip-section" style="display:none">
    <div class="chip-label">Контекст</div>
    <div class="chip-row" id="ctx-row"></div>
  </div>

  <!-- Project filter -->
  <div id="proj-sec" class="chip-section" style="display:none">
    <div class="chip-label">Проект</div>
    <div class="chip-row" id="proj-row"></div>
  </div>

  <!-- Sort + clear -->
  <div class="controls">
    Сортировка:
    <select id="sort">
      <option value="order">По порядку</option>
      <option value="pri">По приоритету</option>
      <option value="due">По сроку (due:)</option>
      <option value="date">По дате создания</option>
      <option value="text">По алфавиту</option>
    </select>
    <button id="clear-filters" style="display:none">✕ Сбросить фильтры</button>
  </div>

  <div class="tasklist" id="list"></div>
  <button id="ignored-toggle"></button>

  <script>
    // ➤цель: separator (U+27A4 + "цель:")
    const GOAL_SEP = '\u27A4\u0446\u0435\u043b\u044c:';
    const PRI_CHIP_CLS = { A:'pri-a', B:'pri-b', C:'pri-c' };
    const PRI_TAG_CLS  = { A:'t-pri-A', B:'t-pri-B', C:'t-pri-C' };
    const priOrd = p => p ? (p.charCodeAt(0) - 64) : 27; // A=1..Z=26, none=27

    let items = [];
    let tab = 'active', priF = null, ctxF = null, projF = null;
    let sortMode = 'order', searchQ = '';
    let showIgnored = false, rightClickedIdx = -1;
    const collapsedSections = new Set(); // хранит _raw маркеров свёрнутых секций

    function toggleSection(raw) {
      if (collapsedSections.has(raw)) collapsedSections.delete(raw);
      else collapsedSections.add(raw);
      render();
    }

    // --- Boolean search ---

    function searchMatches(rawText, q) {
      if (!q.trim()) return true;
      const text = rawText.toLowerCase();
      const tokens = [];
      const re = /"([^"]+)"|(OR|\|\||AND|&&)|(-[\w\u0400-\u04FF]+)|([\w\u0400-\u04FF]+)/gi;
      let m;
      while ((m = re.exec(q)) !== null) {
        if (m[1] !== undefined) tokens.push({ type: 'phrase', val: m[1].toLowerCase() });
        else if (m[2] !== undefined) tokens.push({ type: /^(OR|\|\|)$/i.test(m[2]) ? 'OR' : 'AND' });
        else if (m[3] !== undefined) tokens.push({ type: 'NOT', val: m[3].slice(1).toLowerCase() });
        else tokens.push({ type: 'word', val: m[4].toLowerCase() });
      }
      // Split by OR into groups; each group is implicitly ANDed
      const orGroups = [[]];
      for (const tok of tokens) {
        if (tok.type === 'OR') orGroups.push([]);
        else if (tok.type !== 'AND') orGroups[orGroups.length - 1].push(tok);
      }
      return orGroups.some(group =>
        group.every(tok => tok.type === 'NOT' ? !text.includes(tok.val) : text.includes(tok.val))
      );
    }

    function queryTerms(q) {
      if (!q.trim()) return [];
      const terms = [];
      const re = /"([^"]+)"|(OR|\|\||AND|&&)|(-[\w\u0400-\u04FF]+)|([\w\u0400-\u04FF]+)/gi;
      let m;
      while ((m = re.exec(q)) !== null) {
        if (m[1] !== undefined) terms.push(m[1].toLowerCase());       // quoted phrase
        else if (m[4] !== undefined) terms.push(m[4].toLowerCase());  // plain word
        // operators (m[2]) and NOT (m[3]) are skipped
      }
      return terms;
    }

    // --- Parsing ---

    function parseLine(line) {
      const si = line.indexOf(GOAL_SEP);
      const mainLine = si !== -1 ? line.slice(0, si).trim() : line;
      const goal = si !== -1 ? line.slice(si + GOAL_SEP.length).trim() : null;
      let item;
      try { item = TodoTxt.parseLine(mainLine); }
      catch (_) {
        item = { text: mainLine, complete: false, priority: null,
          contexts: null, projects: null, date: null, dateString: () => null };
      }
      // Parse due: extension manually (jstodotxt 0.10 doesn't auto-parse extensions)
      const dueM = mainLine.match(/\bdue:(\d{4}-\d{2}-\d{2})\b/);
      item._due     = dueM ? dueM[1] : null;
      item._goal    = goal;
      item._raw     = line;
      item._ignored = false;
      return item;
    }

    function loadItems() {
      const raw = (localStorage.getItem('tasks') || '').split('\n');
      items = [];
      let inIgnored = false;
      for (const line of raw) {
        if (!line.trim()) continue;
        const trimmed = line.trim();
        // Маркеры секций — рендерятся как заголовки, не как задачи
        if (/^SORTED\s*\(/i.test(trimmed)) {
          items.push({ _sectionHeader: true, _raw: line, _label: trimmed, _ignored: false, complete: false, priority: null, contexts: null, projects: null });
          continue;
        }
        if (/^PARTIALLY SORTED/i.test(trimmed)) {
          items.push({ _sectionHeader: true, _raw: line, _label: trimmed, _ignored: false, complete: false, priority: null, contexts: null, projects: null });
          continue;
        }
        if (/^#?\s*ИГНОРИРУЕМЫЕ\s+ЗАДАЧИ/i.test(trimmed)) {
          inIgnored = true;
          items.push({ _sectionHeader: true, _raw: line, _label: trimmed.replace(/^#+\s*/, ''), _ignored: true, complete: false, priority: null, contexts: null, projects: null });
          continue;
        }
        const item = parseLine(line);
        item._ignored = inIgnored;
        items.push(item);
      }
      render();
    }

    function saveItems() {
      localStorage.setItem('tasks', items.map(t => t._raw).join('\n'));
    }

    // --- Quick add ---

    function addTask(text) {
      text = text.trim();
      if (!text) return;
      const item = parseLine(text);
      item._ignored = false;
      items.push(item);
      saveItems();
      render();
    }

    // --- Filter & sort ---

    function getFiltered() {
      if (sortMode === 'order') {
        // Естественный порядок: заголовки секций всегда включаем, задачи — фильтруем
        return items.filter(t => {
          if (t._sectionHeader) return true;
          if (t._ignored && !showIgnored) return false;
          if (tab === 'active' && t.complete) return false;
          if (tab === 'done'   && !t.complete) return false;
          if (priF  && t.priority !== priF) return false;
          if (ctxF  && !(t.contexts && t.contexts.includes(ctxF))) return false;
          if (projF && !(t.projects && t.projects.includes(projF))) return false;
          if (searchQ && !searchMatches(t._raw, searchQ)) return false;
          return true;
        });
      }
      let list = items.filter(t => !t._sectionHeader && (!t._ignored || showIgnored));
      if (tab === 'active') list = list.filter(t => !t.complete);
      if (tab === 'done')   list = list.filter(t =>  t.complete);
      if (priF)  list = list.filter(t => t.priority === priF);
      if (ctxF)  list = list.filter(t => t.contexts && t.contexts.includes(ctxF));
      if (projF) list = list.filter(t => t.projects && t.projects.includes(projF));
      if (searchQ) list = list.filter(t => searchMatches(t._raw, searchQ));
      return list;
    }

    function getSorted(list) {
      if (sortMode === 'order') return list; // сохраняем естественный порядок
      return list.slice().sort((a, b) => {
        if (sortMode === 'pri') return priOrd(a.priority) - priOrd(b.priority);
        if (sortMode === 'due') {
          const da = a._due || '9999-99-99', db = b._due || '9999-99-99';
          return da < db ? -1 : da > db ? 1 : 0;
        }
        if (sortMode === 'date') {
          const da = a.date ? a.date.getTime() : 0;
          const db = b.date ? b.date.getTime() : 0;
          return db - da;
        }
        return (a.text || '').localeCompare(b.text || '', 'ru');
      });
    }

    // --- Text helpers ---

    const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const escRe = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

    // Apply search highlight to already-HTML-escaped text; terms is an array of strings
    function applyHL(html, terms) {
      if (!terms || !terms.length) return html;
      let result = html;
      for (const t of terms) {
        result = result.replace(new RegExp('(' + escRe(esc(t)) + ')', 'gi'), '<mark>$1</mark>');
      }
      return result;
    }

    // Linkify URLs + apply search highlight; input is plain text, terms is an array
    function renderText(plain, terms) {
      const URL_RE = /https?:\/\/[^\s<>"]+/g;
      let out = '', last = 0, m;
      while ((m = URL_RE.exec(plain)) !== null) {
        out += applyHL(esc(plain.slice(last, m.index)), terms);
        const url = m[0];
        out += `<a class="task-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${applyHL(esc(url), terms)}</a>`;
        last = m.index + url.length;
      }
      out += applyHL(esc(plain.slice(last)), terms);
      return out;
    }

    // --- Badge helpers ---

    function priTag(p) {
      if (!p) return '';
      const cls = PRI_TAG_CLS[p] || 't-pri-D';
      return `<span class="t t-pri ${cls}">${esc(p)}</span>`;
    }

    function dueTag(dueStr) {
      if (!dueStr) return '';
      const due = new Date(dueStr + 'T00:00:00');
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const diff = Math.round((due - today) / 86400000);
      let cls, label;
      if (diff < 0)        { cls = 'due-overdue'; label = `просрочено ${-diff}д`; }
      else if (diff === 0) { cls = 'due-today';   label = 'сегодня'; }
      else if (diff <= 3)  { cls = 'due-soon';    label = `через ${diff}д`; }
      else                 { cls = 'due-ok';      label = dueStr; }
      return `<span class="t t-due ${cls}">📅 ${esc(label)}</span>`;
    }

    // --- Render ---

    function render() {
      const terms = queryTerms(searchQ);
      const show  = getSorted(getFiltered());
      document.getElementById('count').textContent = show.filter(t => !t._sectionHeader && !t._ignored).length;

      // Ignored toggle button
      const ignoredCount = items.filter(t => t._ignored).length;
      const toggleBtn = document.getElementById('ignored-toggle');
      toggleBtn.style.display = ignoredCount ? '' : 'none';
      toggleBtn.textContent = showIgnored
        ? `🙈 Скрыть игнорируемые (${ignoredCount})`
        : `👁 Показать игнорируемые (${ignoredCount})`;

      // Chip source: base tab, excluding ignored unless shown, excluding section headers
      const base = items.filter(t =>
        !t._sectionHeader &&
        (tab === 'active' ? !t.complete : tab === 'done' ? t.complete : true) &&
        (!t._ignored || showIgnored)
      );
      const pris  = [...new Set(base.map(t => t.priority).filter(Boolean))].sort();
      const ctxs  = [...new Set(base.flatMap(t => t.contexts || []))].sort();
      const projs = [...new Set(base.flatMap(t => t.projects || []))].sort();

      // Priority chips
      const priSec = document.getElementById('pri-sec');
      if (pris.length) {
        priSec.style.display = '';
        document.getElementById('pri-row').innerHTML = pris.map(p => {
          const cc = PRI_CHIP_CLS[p] || 'pri-d';
          return `<button class="chip ${cc}${priF===p?' on':''}" onclick="setPri('${esc(p)}')">(${esc(p)})</button>`;
        }).join('');
      } else { priSec.style.display = 'none'; }

      // Context chips
      const ctxSec = document.getElementById('ctx-sec');
      if (ctxs.length) {
        ctxSec.style.display = '';
        document.getElementById('ctx-row').innerHTML = ctxs.map(c => {
          const safe = c.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<button class="chip${ctxF===c?' on':''}" onclick="setCtx('${safe}')">@${esc(c)}</button>`;
        }).join('');
      } else { ctxSec.style.display = 'none'; }

      // Project chips
      const projSec = document.getElementById('proj-sec');
      if (projs.length) {
        projSec.style.display = '';
        document.getElementById('proj-row').innerHTML = projs.map(p => {
          const safe = p.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<button class="chip${projF===p?' on':''}" onclick="setProj('${safe}')">+${esc(p)}</button>`;
        }).join('');
      } else { projSec.style.display = 'none'; }

      // Clear-filters button
      const hasFilter = !!(priF || ctxF || projF || searchQ);
      document.getElementById('clear-filters').style.display = hasFilter ? '' : 'none';

      // Task rows
      const listEl = document.getElementById('list');
      if (!show.length) {
        listEl.innerHTML = '<div class="empty">Нет задач</div>';
        return;
      }

      // В режиме 'order' скрываем задачи свёрнутых секций
      const hiddenBySection = new Set();
      if (sortMode === 'order') {
        let currentHeader = null;
        for (const t of show) {
          if (t._sectionHeader) { currentHeader = t; continue; }
          if (currentHeader && collapsedSections.has(currentHeader._raw)) hiddenBySection.add(t);
        }
      }

      listEl.innerHTML = show.filter(t => !hiddenBySection.has(t)).map(t => {
        if (t._sectionHeader) {
          // Считаем задачи этой секции в show (до фильтра по collapsed)
          let count = 0, found = false;
          for (const s of show) {
            if (s === t) { found = true; continue; }
            if (found) {
              if (s._sectionHeader) break;
              count++;
            }
          }
          const collapsed = collapsedSections.has(t._raw);
          const safeRaw = t._raw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<div class="section-header" onclick="toggleSection('${safeRaw}')">
  <span class="section-toggle${collapsed?' collapsed':''}">▾</span>
  ${esc(t._label)}
  <span class="section-count">${count}</span>
</div>`;
        }
        const idx = items.indexOf(t);
        const tags = [];
        if (t.priority) tags.push(priTag(t.priority));
        if (t._due)     tags.push(dueTag(t._due));
        (t.contexts || []).forEach(c => tags.push(`<span class="t t-ctx">@${esc(c)}</span>`));
        (t.projects || []).forEach(p => tags.push(`<span class="t t-proj">+${esc(p)}</span>`));
        if (t.date && typeof t.dateString === 'function') {
          const ds = t.dateString();
          if (ds) tags.push(`<span class="t t-date">${esc(ds)}</span>`);
        }

        // Strip due: token from displayed text (it's shown as a badge)
        const displayText = (t.text || t._raw).replace(/\bdue:\d{4}-\d{2}-\d{2}\b/g, '').trim();

        return `<div class="task-row${t.complete ? ' done' : ''}${t._ignored ? ' ignored-row' : ''}" data-idx="${idx}">
  <input type="checkbox" ${t.complete ? 'checked' : ''} onchange="toggleDone(${idx})">
  <div class="task-body">
    <span class="task-text">${renderText(displayText, terms)}</span>
    ${t._goal ? `<span class="task-goal">🎯 ${renderText(t._goal, terms)}</span>` : ''}
    ${tags.length ? `<div class="task-tags">${tags.join('')}</div>` : ''}
  </div>
  <button class="proc-btn" title="Обработать в Помогаторе" onclick="openProcess(${idx})">⚙</button>
</div>`;
      }).join('');
    }

    // --- Actions ---

    function toggleDone(idx) {
      const t = items[idx];
      t.complete = !t.complete;
      if (t.complete) {
        const today = new Date().toISOString().slice(0, 10);
        t._raw = 'x ' + today + ' ' + t._raw;
      } else {
        t._raw = t._raw.replace(/^x\s+\d{4}-\d{2}-\d{2}\s+/, '');
      }
      saveItems();
      render();
    }

    function openProcess(idx) {
      window.location.href = '/process?task=' + encodeURIComponent(items[idx]._raw) + '&from=tasks';
    }

    function moveToIgnored(idx) {
      items[idx]._ignored = true;
      saveItems();
      render();
    }

    function restoreIgnored(idx) {
      items[idx]._ignored = false;
      saveItems();
      render();
    }

    function setPri(p) { priF = priF === p ? null : p; render(); }
    function setCtx(c) { ctxF = ctxF === c ? null : c; render(); }
    function setProj(p) { projF = projF === p ? null : p; render(); }

    function clearAllFilters() {
      priF = ctxF = projF = null;
      searchQ = '';
      const si = document.getElementById('search');
      si.value = '';
      document.getElementById('search-clear').style.display = 'none';
      render();
    }

    // --- Context menu ---

    function initContextMenu() {
      const listEl = document.getElementById('list');
      if (!listEl || typeof VanillaContextMenu === 'undefined') return;
      // Capture the right-clicked row index before the menu opens
      listEl.addEventListener('contextmenu', e => {
        const row = e.target.closest('.task-row[data-idx]');
        rightClickedIdx = row ? parseInt(row.dataset.idx, 10) : -1;
      }, true);
      new VanillaContextMenu({
        scope: listEl,
        theme: 'black',
        transitionDuration: 100,
        normalizePosition: true,
        menuItems: [
          { label: '⚙ Обработать (GTD)', callback: () => { if (rightClickedIdx >= 0) openProcess(rightClickedIdx); } },
          { label: '✓ Отметить выполненной', callback: () => { if (rightClickedIdx >= 0) toggleDone(rightClickedIdx); } },
          'hr',
          { label: '🚫 В игнорируемые', callback: () => { if (rightClickedIdx >= 0 && !items[rightClickedIdx]._ignored) moveToIgnored(rightClickedIdx); } },
          { label: '↩ Вернуть из игнорируемых', callback: () => { if (rightClickedIdx >= 0 && items[rightClickedIdx]._ignored) restoreIgnored(rightClickedIdx); } },
          'hr',
          { label: '📋 Копировать текст', callback: () => { if (rightClickedIdx >= 0) navigator.clipboard?.writeText(items[rightClickedIdx]._raw); } },
        ],
      });
    }

    // --- Event listeners ---

    // Tabs
    document.querySelectorAll('.tab').forEach(btn => {
      btn.onclick = () => {
        tab = btn.dataset.t;
        priF = ctxF = projF = null;
        document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b === btn));
        render();
      };
    });

    // Sort
    document.getElementById('sort').onchange = e => { sortMode = e.target.value; render(); };

    // Clear filters
    document.getElementById('clear-filters').onclick = clearAllFilters;

    // Ignored toggle
    document.getElementById('ignored-toggle').onclick = () => { showIgnored = !showIgnored; render(); };

    // Search
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('search-clear');
    searchInput.oninput = () => {
      searchQ = searchInput.value;
      searchClear.style.display = searchQ ? '' : 'none';
      render();
    };
    searchClear.onclick = () => {
      searchInput.value = ''; searchQ = '';
      searchClear.style.display = 'none';
      render();
    };

    // Quick-add
    const addInput = document.getElementById('add-input');
    document.getElementById('add-btn').onclick = () => { addTask(addInput.value); addInput.value = ''; };
    addInput.onkeydown = e => {
      if (e.key === 'Enter') { addTask(addInput.value); addInput.value = ''; }
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      const active = document.activeElement;
      const typing = active === searchInput || active === addInput || active.tagName === 'TEXTAREA' || active.tagName === 'INPUT';
      if (e.key === '/' && !e.ctrlKey && !e.metaKey && !typing) {
        e.preventDefault();
        searchInput.focus();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
      if (e.key === 'Escape' && active === searchInput) {
        searchInput.blur();
        if (searchQ) { searchInput.value = ''; searchQ = ''; searchClear.style.display = 'none'; render(); }
      }
    });

    loadItems();
    initContextMenu();
  </script>
</body>
</html>
